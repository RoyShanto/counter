<body class="bg-gray-100 min-h-screen md:py-3 md:px-10 max-sm:p-3">

    <!-- LOGIN SCREEN (exactly same UI) -->

    <!-- MAIN CONTENT (hidden until login) -->

        <!-- dynamic investment cards container -->

        <!-- calculators side by side (identical layout) -->

            <!-- DCAL card -->
            <div class="bg-white shadow-lg rounded-2xl p-6">
                <h2 class="text-2xl font-bold text-center text-blue-600 mb-6"> DCAL </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="deposit" class="font-semibold">Monthly Deposit</label>
                        <input type="text" inputmode="numeric" pattern="[0-9,]*" id="deposit" value="5,000"

                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">

                    </div>
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="rate" class="font-semibold">Annual Interest Rate (%)</label>
                        <input type="number" id="rate" value="9.25"
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="dpsTax" class="font-semibold">Source Tax on Interest (%)</label>
                        <input type="number" id="dpsTax" value="10"

                    <button onclick="calculateDPS()"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold transition">

                </div>
                <div id="dpsResult" class="mt-6 bg-blue-50 border border-blue-200 p-4 rounded-lg text-gray-800 hidden">
                </div>
            </div>
            <!-- FCAL card -->
            <div class="bg-white shadow-lg rounded-2xl p-6">
                <h2 class="text-2xl font-bold text-center text-green-600 mb-6"> FCAL </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="fdrAmount" class="font-semibold"> Principal Amount </label>
                        <input type="text" inputmode="numeric" pattern="[0-9,]*" id="fdrAmount" value="500,000"
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    </div>


                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label id="durationLabel" for="fdrYears" class="font-semibold"> Duration (Months) </label>
                        <div class="relative w-full">
                            <input type="number" id="fdrYears" value="1" placeholder="Per month = 30 days"
                                class="w-full p-2 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                            <label class="absolute right-2 top-1/2 -translate-y-1/2 cursor-pointer flex items-center">
                                <input type="checkbox" id="durationDays" class="sr-only peer">
                                <div class="w-9 h-5 bg-gray-300 rounded-full peer
                                    peer-checked:bg-green-600
                                    after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                                    after:bg-white after:rounded-full
                                    after:h-4 after:w-4 after:transition-all
                                    peer-checked:after:translate-x-4">
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="fdrRate" class="font-semibold"> Annual Interest Rate (%) </label>
                        <input type="number" id="fdrRate" value="9.5"
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    </div>
                    <div class="grid grid-cols-[1fr_1fr] items-center gap-4">
                        <label for="fdrTax" class="font-semibold"> Source Tax on Interest (%) </label>
                        <input type="number" id="fdrTax" value="10"

                    class="mt-6 bg-green-50 border border-green-200 p-4 rounded-lg text-gray-800 hidden">

        <!-- floating calculator button (exactly same) -->
        <button id="openCalculator"

            C

        <!-- calculator modal (identical structure) -->
        <div id="calculatorModal"
            class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white p-2 max-sm:top-[22%] rounded-2xl shadow-xl max-sm:w-full relative">
                <button id="closeCalculator"
                    class="absolute top-3 right-3 text-gray-500 hover:text-gray-700 font-bold">✖</button>
                <div class="shadow-xl rounded-2xl p-6 w-full md:w-[300px] bg-white">
                    <div id="calcDisplay"
                        class="bg-gray-50 border border-gray-300 text-right text-4xl p-4 rounded-xl mb-6 font-semibold text-black tracking-wide overflow-x-auto">
                        0</div>
                    <div class="grid grid-cols-4 gap-3 text-lg font-semibold select-none">
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="C">C</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="DEL">⌫</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="%">%</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"

                        <button

                            data-val="7">7</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="8">8</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="9">9</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="*">×</button>

                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="4">4</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="5">5</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="6">6</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="-">−</button>

                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="1">1</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="2">2</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="3">3</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val="+">+</button>

                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl col-span-2 active:scale-95 hover:bg-gray-100 transition"
                            data-val="0">0</button>
                        <button
                            class="calc-btn bg-white text-black border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-gray-100 transition"
                            data-val=".">.</button>
                        <button
                            class="calc-btn bg-blue-600 text-white border border-gray-300 py-4 rounded-xl active:scale-95 hover:bg-blue-800 transition"
                            data-val="=">=</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <hr class="lg:mx-10 mt-12">

    <script>
        (function () {
            // ---------- disable right‑click & devtools shortcuts (unchanged) ----------
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('keydown', (e) => {
                if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.ctrlKey && e.keyCode === 85)) {
                    e.preventDefault();
                }
            });

            // ---------- LOGIN ----------
            window.checkLogin = function () {
                const iUTest = document.getElementById('test').value.trim();
                const iUSection = document.getElementById('iUSection');
                const mainContent = document.getElementById('mainContent');
                const msg = document.getElementById('loginMessage');

                if (iUTest.toLowerCase() === 'bible') {
                    iUSection.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                } else if (iUTest === '821') {
                    msg.textContent = "WoW...! You Are Right.";
                    msg.classList.add("text-green-600");
                    msg.classList.remove("text-red-600");
                } else {
                    msg.textContent = "Wrong Answer, Try Again...!";
                    msg.classList.add("text-red-600");
                    msg.classList.remove("text-green-600");
                }
            };

            // ---------- DATA ----------
            const investments = [
                { label: '39?45?898*', p: "U", startDate: '2026-02-19', closeDate: '2031-02-19', policy: "sameDate", periods: 60, interval: 1 },
                { label: '30?15?375', p: "U", startDate: '2026-02-04', closeDate: '2026-05-04', policy: "sameDate", periods: 1, interval: 3 },
                { label: '27?10?646*', p: "O", startDate: '2025-04-28', closeDate: '2028-04-28', policy: "sameDate", periods: 12, interval: 3 },
                { label: '27?10?562*', p: "O", startDate: '2025-05-04', closeDate: '2028-05-04', policy: "sameDate", periods: 12, interval: 3 },
                { label: '26?10?482*', p: "O", startDate: '2025-08-21', closeDate: '2028-08-21', policy: "sameDate", periods: 12, interval: 3 },
                { label: '10?5?406', p: "O", startDate: '2025-01-04', closeDate: '2026-04-04', policy: "sameDate", periods: 5, interval: 3 },
                { label: '10?5?406', p: "O", startDate: '2025-01-04', closeDate: '2026-04-04', policy: "sameDate", periods: 5, interval: 3 },
                { label: '10?5?406', p: "O", startDate: '2025-01-04', closeDate: '2026-04-04', policy: "sameDate", periods: 5, interval: 3 },
                { label: '3?5?562', p: "O", startDate: '2025-11-19', closeDate: '2026-05-19', policy: "monthEnd", periods: 6, interval: 1 },
                { label: '3?5?562', p: "O", startDate: '2025-11-19', closeDate: '2026-05-19', policy: "monthEnd", periods: 6, interval: 1 },
                { label: '3?5?562', p: "O", startDate: '2025-11-19', closeDate: '2026-05-19', policy: "monthEnd", periods: 6, interval: 1 },
                { label: '3?5?562', p: "O", startDate: '2025-11-19', closeDate: '2026-05-19', policy: "monthEnd", periods: 6, interval: 1 },
                { label: '13?5?837*', p: "N", startDate: '2025-05-15', closeDate: '2028-05-15', policy: "sameDate", periods: 12, interval: 3 },
                { label: '13?5?269*', p: "N", startDate: '2025-08-17', closeDate: '2028-08-17', policy: "sameDate", periods: 12, interval: 3 },
                { label: '52?20?965*', p: "N", startDate: '2025-09-29', closeDate: '2028-09-29', policy: "sameDate", periods: 12, interval: 3 },
                { label: '3?5?562', p: "N", startDate: '2026-01-27', closeDate: '2027-01-27', policy: "monthEnd", periods: 12, interval: 1 },
                { label: '3?5?562', p: "N", startDate: '2026-01-27', closeDate: '2027-01-27', policy: "monthEnd", periods: 12, interval: 1 },
                { label: '3?5?562', p: "N", startDate: '2026-01-27', closeDate: '2027-01-27', policy: "monthEnd", periods: 12, interval: 1 },
                { label: '2?3?137', p: "N", startDate: '2026-03-08', closeDate: '2027-03-08', policy: "monthEnd", periods: 12, interval: 1 },
                { label: '1?2.5?781', p: "N", startDate: '2026-01-28', closeDate: '2027-01-27', policy: "monthEnd", periods: 12, interval: 1 }
            ];

            // ---------- helper: find next date & days left ----------
            function getNextDateAndDiff(startDate, periods, interval, policy) {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const base = new Date(startDate);
                for (let i = 0; i < periods; i++) {
                    let next = new Date(base);
                    next.setMonth(next.getMonth() + interval * (i + 1));
                    if (policy === "monthEnd") {
                        next = new Date(next.getFullYear(), next.getMonth() + 1, 0);
                    }
                    next.setHours(0, 0, 0, 0);
                    const diff = Math.ceil((next - today) / (1000 * 60 * 60 * 24));
                    if (diff >= 0) return { nextDate: next, daysLeft: diff };
                }
                return { nextDate: null, daysLeft: Infinity };
            }

            // ---------- enrich investments with nextDate, daysLeft, restDays ----------
            const today = new Date(); today.setHours(0, 0, 0, 0);
            investments.forEach(inv => {
                const { nextDate, daysLeft } = getNextDateAndDiff(inv.startDate, inv.periods, inv.interval, inv.policy);
                inv.nextDate = nextDate;
                inv.daysLeft = daysLeft;

                if (inv.closeDate) {
                    const close = new Date(inv.closeDate); close.setHours(0, 0, 0, 0);
                    inv.restDays = Math.ceil((close - today) / (1000 * 60 * 60 * 24));
                } else {
                    inv.restDays = null;
                }
            });

            // ---------- render cards, grouped by 'p' (exact same UI logic) ----------
            const psContainer = document.getElementById('ps-container');
            const grouped = {};
            investments.forEach(inv => {
                if (!grouped[inv.p]) grouped[inv.p] = [];
                grouped[inv.p].push(inv);
            });

            Object.keys(grouped).forEach(p => {
                const section = document.createElement('div');
                section.className = "bg-gray-50 rounded-xl md:p-4";

                const header = document.createElement('h2');
                header.className = "text-2xl font-bold mb-4 text-white bg-blue-500 rounded-lg p-2";
                header.textContent = `${p} (${grouped[p].length})`;
                section.appendChild(header);

                const row = document.createElement('div');
                row.className = "flex flex-wrap max-sm:justify-between gap-2";

                // sort by urgency
                grouped[p].sort((a, b) => a.daysLeft - b.daysLeft);

                grouped[p].forEach(inv => {
                    const card = document.createElement('div');
                    card.className = "bg-white border-4 md:p-4 max-sm:p-3 max-sm:w-[180px] rounded-lg shadow hover:shadow-lg transition-shadow relative group";

                    // colour border by daysLeft
                    if (inv.daysLeft <= 10) card.classList.add("border-green-600");
                    else if (inv.daysLeft <= 30) card.classList.add("border-green-400");
                    else if (inv.daysLeft <= 60) card.classList.add("border-green-200");
                    else if (inv.daysLeft <= 80) card.classList.add("border-red-200");
                    else card.classList.add("border-red-400");

                    const title = document.createElement('h2');
                    title.className = "font-bold text-lg mb-2 text-center text-blue-700 bg-blue-100 rounded-lg";
                    title.textContent = inv.label;
                    card.appendChild(title);

                    const countdown = document.createElement('p');
                    countdown.className = "text-center text-sm font-semibold text-blue-700 bg-[#f3f4f6] rounded p-1 mb-2";
                    countdown.textContent = inv.daysLeft !== Infinity ? `${inv.daysLeft} days left` : "All dates passed";
                    card.appendChild(countdown);

                    // tooltip with restDays (only if exists)
                    if (inv.restDays !== null) {
                        const tooltip = document.createElement('div');
                        tooltip.className = "absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-black text-white text-xs px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap";
                        tooltip.textContent = inv.restDays >= 0 ? `${inv.closeDate}__${inv.restDays}` : `Closed ${Math.abs(inv.restDays)} days ago ${inv.closeDate}`;
                        card.appendChild(tooltip);
                    }

                    // list of all installment dates
                    const ol = document.createElement('ol');
                    ol.className = "list-decimal list-inside space-y-1 text-sm max-h-32 overflow-y-auto";
                    const baseDate = new Date(inv.startDate);
                    for (let i = 0; i < inv.periods; i++) {
                        let current;
                        if (inv.policy === "monthEnd") {
                            current = new Date(baseDate.getFullYear(), baseDate.getMonth() + i + 1, 0);
                        } else {
                            current = new Date(baseDate);
                            current.setMonth(baseDate.getMonth() + inv.interval * (i + 1));
                        }
                        const li = document.createElement('li');
                        li.textContent = current.toDateString();
                        if (inv.nextDate && current.setHours(0, 0, 0, 0) === inv.nextDate.setHours(0, 0, 0, 0)) {
                            li.className = "text-orange-500 font-bold";
                        }
                        ol.appendChild(li);
                    }
                    card.appendChild(ol);
                    row.appendChild(card);
                });
                section.appendChild(row);
                psContainer.appendChild(section);
            });

            // ---------- display today's date ----------
            document.getElementById('today-date').innerText = new Date().toDateString();

            // ---------- COMMA FORMATTING for amount inputs (unified) ----------
            const formatNumber = (val) => new Intl.NumberFormat('en-BD').format(val);
            const unformatNumber = (str) => str.replace(/,/g, '');

            function enableCommaFormat(inputEl) {
                inputEl.addEventListener("input", function (e) {
                    let cursor = e.target.selectionStart;
                    // remove non-numbers
                    let raw = e.target.value.replace(/[^\d]/g, "");
                    if (raw === "") {
                        e.target.value = "";
                        return;
                    }
                    // count commas before formatting
                    let beforeLength = e.target.value.length;
                    // format
                    let formatted = formatNumber(raw);
                    e.target.value = formatted;
                    // adjust cursor position
                    let afterLength = formatted.length;
                    cursor = cursor + (afterLength - beforeLength);
                    e.target.setSelectionRange(cursor, cursor);
                });
            }
            
            // apply to both calculator inputs
            enableCommaFormat(document.getElementById('fdrAmount'));
            enableCommaFormat(document.getElementById('deposit'));

            // ---------- CALCULATOR MODAL ----------
            const modal = document.getElementById('calculatorModal');
            document.getElementById('openCalculator').addEventListener('click', () => modal.classList.remove('hidden'));
            document.getElementById('closeCalculator').addEventListener('click', () => modal.classList.add('hidden'));
            const display = document.getElementById("calcDisplay");


            function formatExpression(exp) {
                return exp.replace(/\d+(\.\d+)?/g, (num) => {
                    return formatNumber(num);
                });
            }


            // Create One Input Function
            function handleCalcInput(val) {
                let current = unformatNumber(display.textContent.trim());
                if (val === "C") {
                    display.textContent = "0";
                    return;
                }
                if (val === "DEL") {
                    current = current.slice(0, -1) || "0";
                    if (current === "0") {
                        display.textContent = "0";
                    } else {
                        display.textContent = formatExpression(current);
                    }
                    return;
                }
                if (val === "%") {
                    let match = current.match(/(\d+\.?\d*)$/);
                    if (match) {
                        let num = parseFloat(match[1]) / 100;
                        display.textContent = current.replace(/(\d+\.?\d*)$/, num);
                    }
                    return;
                }
                if (val === "=") {
                    try {
                        let result = eval(current);
                        display.textContent = formatNumber(result);
                    } catch {
                        display.textContent = "Error";
                    }
                    return;
                }
                const ops = ["+", "-", "*", "/"];
                if (ops.includes(val)) {
                    if (ops.includes(current.slice(-1))) return;
                    display.textContent += val;
                    return;
                }
                if (current === "0") {
                    current = val;
                } else {
                    current += val;
                }
                display.textContent = formatExpression(current);
            }


            // Use It For Mouse Clicks
            document.querySelectorAll('.calc-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    handleCalcInput(btn.dataset.val);
                });
            });


            // Add Keyboard Support
            document.addEventListener("keydown", (e) => {

                const key = e.key;

                if (!modal.classList.contains("hidden")) {

                    if (!isNaN(key)) handleCalcInput(key);

                    if (["+", "-", "*", "/"].includes(key))
                        handleCalcInput(key);

                    if (key === "Enter") handleCalcInput("=");

                    if (key === "Backspace") handleCalcInput("DEL");

                    if (key === "Escape") handleCalcInput("C");

                    if (key === ".") handleCalcInput(".");
                }

            });






            // document.querySelectorAll('.calc-btn').forEach(btn => {
            //     btn.addEventListener('click', () => {

            // ---------- DCAL (unchanged calculation, but using unformat) ----------
            window.calculateDPS = function () {
                const P = parseFloat(unformatNumber(document.getElementById('deposit').value));
                const t = parseFloat(document.getElementById('years').value);
                const r = parseFloat(document.getElementById('rate').value) / 100;
                const taxRate = parseFloat(document.getElementById('dpsTax').value) / 100 || 0;
                const n = 12;
                const resultDiv = document.getElementById('dpsResult');

                if (isNaN(P) || isNaN(t) || isNaN(r) || P <= 0 || t <= 0 || r <= 0) {
                    resultDiv.innerHTML = `<p class='text-red-600 font-semibold'>⚠️ Please enter valid positive numbers.</p>`;
                    resultDiv.classList.remove('hidden');
                    return;
                }

                const M = P * ((Math.pow((1 + r / n), n * t) - 1) / (r / n)) * (1 + r / n);
                const totalDeposit = P * n * t;
                const interest = M - totalDeposit;
                const taxAmount = interest * taxRate;
                const maturityAfterTax = M - taxAmount;
                const interestAfterTax = M - totalDeposit - taxAmount;

                resultDiv.innerHTML = `
                    <p><strong>Total Deposit: </strong>${formatNumber(totalDeposit.toFixed(2))}</p>
                    <p><strong>Interest Earned: </strong>${formatNumber(interest.toFixed(2))}</p>
                    <p><strong>Maturity Amount: </strong> <span class='text-blue-600 font-bold'>${formatNumber(M.toFixed(2))}</span></p>
                    <p><strong>Source Tax: </strong>${formatNumber(taxAmount.toFixed(2))} (${(taxRate * 100).toFixed(1)}%)</p>
                    <p><strong>Maturity After Tax: </strong> <span class='text-blue-600 font-bold'>${formatNumber(maturityAfterTax.toFixed(2))}</span></p>
                    <p><strong>Interest After Tax: </strong> <span class='text-blue-600 font-bold'>${formatNumber(interestAfterTax.toFixed(2))}</span></p>
                `;
                resultDiv.classList.remove('hidden');
            };


            document.getElementById("durationDays").addEventListener("change", toggleDurationLabel);
            function toggleDurationLabel() {
                const checkbox = document.getElementById('durationDays');
                const label = document.getElementById('durationLabel');
                if (checkbox.checked) {
                    label.textContent = "Duration (Days)";
                } else {
                    label.textContent = "Duration (Months)";
                }
            }
            // ---------- FCAL (simple interest version, same as original) ----------
            window.calculateFDR = function () {
                const A = parseFloat(unformatNumber(document.getElementById('fdrAmount').value));
                let t = parseFloat(document.getElementById('fdrYears').value);
                const r = parseFloat(document.getElementById('fdrRate').value) / 100;
                const taxRate = parseFloat(document.getElementById('fdrTax').value) / 100 || 0;
                const isDays = document.getElementById('durationDays').checked;
                const resultDiv = document.getElementById('fdrResult');

                if (isNaN(A) || isNaN(t) || isNaN(r) || A <= 0 || t <= 0 || r <= 0) {
                    resultDiv.innerHTML = `<p class='text-red-600 font-semibold'>⚠️ Please enter valid positive numbers.</p>`;
                    resultDiv.classList.remove('hidden');
                    return;
                }
                // convert days → months if checkbox checked
                if (isDays) {
                    t = t / 30;
                }
                const interest = ((A * r) / 12) * t;
                const maturity = A + interest;
                const totalTax = interest * taxRate;
                const maturityAfterTax = maturity - totalTax;
                const interestAfterTax = interest - totalTax;

                resultDiv.innerHTML = `
                    <p><strong>Principal: </strong>${formatNumber(A.toFixed(2))}</p>
                    <p><strong>Interest Earned: </strong>${formatNumber(interest.toFixed(2))}</p>
                    <p><strong>Maturity Amount: </strong> <span class='text-green-600 font-bold'>${formatNumber(maturity.toFixed(2))}</span></p>
                    <p><strong>Source Tax: </strong>${formatNumber(totalTax.toFixed(2))} (${(taxRate * 100).toFixed(1)}%)</p>
                    <p><strong>Maturity After Tax: </strong> <span class='text-green-600 font-bold'>${formatNumber(maturityAfterTax.toFixed(2))}</span></p>
                    <p><strong>Interest After Tax: </strong> <span class='text-green-600 font-bold'>${formatNumber(interestAfterTax.toFixed(2))}</span></p>
                `;
                resultDiv.classList.remove('hidden');
            };
        })();
